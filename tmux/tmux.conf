unbind r 
bind r source-file ~/.tmux.conf

set-option -g default-shell /usr/bin/zsh
set-option -g default-command "${SHELL}"
set -g mouse on 
set-option -g history-limit 50000
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top
set -g base-index 1
set -g renumber-windows 


# List of plugins
set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Manual saves only (no continuum auto-save / auto-restore).
# Save:    prefix + Ctrl-s  (rolling `last`)  or  prefix + S  (named profile)
# Restore: prefix + Ctrl-r  (rolling `last`)  or  prefix + R  (named profile)
# @continuum-restore 'off' only disables auto-restore; auto-SAVE is governed by
# @continuum-save-interval (default 15 min). Set it to 0 so continuum never
# rewrites `last` in the background — that rolling slot is what a named save
# copies from, and a background writer racing it could capture the wrong state.
set -g @continuum-restore 'off'
set -g @continuum-save-interval '0'

# Capture pane scrollback too, so restored panes keep their visible output.
set -g @resurrect-capture-pane-contents 'on'

# Named save profiles (on top of the rolling continuum/`last` snapshot).
# resurrect natively keeps only one restore slot (`last`); this lets you keep
# several named snapshots and restore any one by name.
#   prefix + S  -> save current state under a name (confirms before overwrite)
#   prefix + R  -> restore a named snapshot
#   prefix + G  -> centered popup to browse profiles; type to filter, enter to
#                    restore, esc to close. Press ? inside the popup for the
#                    full shortcut list.
#   prefix + D  -> delete a named snapshot
#   prefix + L  -> restore the most recently saved profile (one keystroke)
#   prefix + W  -> re-save under the current profile name (write-back)
# (default resurrect bindings prefix+Ctrl-s / prefix+Ctrl-r still drive `last`)
bind-key S command-prompt -p "Save profile as:"   "run-shell \"~/.tmux/scripts/resurrect-named.sh save '%%'\""
bind-key R command-prompt -p "Restore profile:"    "run-shell \"~/.tmux/scripts/resurrect-named.sh restore '%%'\""
bind-key G display-popup -E -w 70% -h 70% -T " saved tmux sessions " "~/.tmux/scripts/resurrect-menu.sh"
bind-key D command-prompt -p "Delete profile:"     "run-shell \"~/.tmux/scripts/resurrect-named.sh delete '%%'\""
bind-key L run-shell "~/.tmux/scripts/resurrect-named.sh restore-recent"
bind-key W run-shell "~/.tmux/scripts/resurrect-named.sh save-current"

# Optional hooks (uncomment to enable):
# Run a shell command before save / after restore. PROFILE=<name> is exported.
#   set -g @resurrect-pre-save     'echo "saving $PROFILE" >> ~/.tmux/resurrect.log'
#   set -g @resurrect-post-restore 'echo "restored $PROFILE" >> ~/.tmux/resurrect.log'
# Auto-save a rolling snapshot when a session is closed (safety net):
#   set-hook -g session-closed 'run-shell "~/.tmux/scripts/resurrect-named.sh save --force _auto"'

#Colorscheme: rose-pine
set -g @plugin 'rose-pine/tmux'

set -g @rose_pine_variant 'moon' # Options are 'main', 'moon' or 'dawn'
set -g @rose_pine_host 'on' # Enables hostname in the status bar
set -g @rose_pine_date_time '' # It accepts the date UNIX command format (man date for info)
set -g @rose_pine_user 'on' # Turn on the username component in the statusbar
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar
set -g @rose_pine_bar_bg_disable 'on' # Disables background color, for transparent terminal emulators
# If @rose_pine_bar_bg_disable is set to 'on', uses the provided value to set the background color
# It can be any of the on tmux (named colors, 256-color set, `default` or hex colors)
# See more on http://man.openbsd.org/OpenBSD-current/man1/tmux.1#STYLES
set -g @rose_pine_bar_bg_disabled_color_option 'default'

set -g @rose_pine_only_windows 'on' # Leaves only the window module, for max focus and space
set -g @rose_pine_disable_active_window_menu 'on' # Disables the menu that shows the active window on the left

set -g @rose_pine_default_window_behavior 'on' # Forces tmux default window list behaviour
set -g @rose_pine_show_current_program 'on' # Forces tmux to show the current running program as window name
set -g @rose_pine_show_pane_directory 'on' # Forces tmux to show the current directory as window name
# Previously set -g @rose_pine_window_tabs_enabled

# Example values for these can be:
set -g @rose_pine_left_separator ' > ' # The strings to use as separators are 1-space padded
set -g @rose_pine_right_separator ' < ' # Accepts both normal chars & nerdfont icons
set -g @rose_pine_field_separator ' | ' # Again, 1-space padding, it updates with prefix + I
set -g @rose_pine_window_separator ' - ' # Replaces the default `:` between the window number and name

# These are not padded
set -g @rose_pine_session_icon '' # Changes the default icon to the left of the session name
set -g @rose_pine_current_window_icon '' # Changes the default icon to the left of the active window name
set -g @rose_pine_folder_icon '' # Changes the default icon to the left of the current directory folder
set -g @rose_pine_username_icon '' # Changes the default icon to the right of the hostname
set -g @rose_pine_hostname_icon '󰒋' # Changes the default icon to the right of the hostname
set -g @rose_pine_date_time_icon '󰃰' # Changes the default icon to the right of the date module
set -g @rose_pine_window_status_separator "  " # Changes the default icon that appears between window names

# Very beta and specific opt-in settings, tested on v3.2a, look at issue #10
set -g @rose_pine_prioritize_windows 'on' # Disables the right side functionality in a certain window count / terminal width
set -g @rose_pine_width_to_hide '80' # Specify a terminal width to toggle off most of the right side functionality
set -g @rose_pine_window_count '5' # Specify a number of windows, if there are more than the number, do the same as width_to_hide

# Add to the beginning / end of the left and right sections your own.
set -g @rose_pine_status_left_prepend_section '#{tmux_mode_indicator}'
set -g @rose_pine_status_left_append_section 'It works'
# Show the current resurrect profile (last save/restore) at the left of status-right.
# The trailing #(...) appends '*' when the live tmux state has drifted from that
# saved profile (sessions/windows added or removed) — a nudge to prefix + W.
# Updated each status refresh; raise refresh rate with: set -g status-interval 5
set -g @rose_pine_status_right_prepend_section '#{?#{@resurrect-current},󰓹 #{@resurrect-current}#(~/.tmux/scripts/resurrect-named.sh status-indicator),}'
set -g @rose_pine_status_right_append_section 'too'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
